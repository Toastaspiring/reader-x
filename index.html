<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6c5ce7" />
  <meta name="description" content="ReaderX — a clean EPUB & PDF reading library." />
  <title>ReaderX</title>
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ReaderX" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-theme="light">

  <!-- ============================ LIBRARY ============================ -->
  <section id="library-view" class="view view--active">
    <header class="topbar">
      <div class="brand">
        <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M5 6.5A2.5 2.5 0 0 1 7.5 4H15v22H7.5A2.5 2.5 0 0 0 5 28.5V6.5Z"/>
          <path d="M27 6.5A2.5 2.5 0 0 0 24.5 4H17v22h7.5A2.5 2.5 0 0 1 27 28.5V6.5Z" opacity="0.6"/>
        </svg>
        <span class="brand__name">Reader<b>X</b></span>
      </div>
      <div class="topbar__actions">
        <label class="search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search-input" type="search" placeholder="Search your library…" autocomplete="off" />
        </label>
        <button id="sort-btn" class="btn btn--ghost" title="Change sort order">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4v16M7 4l-3 3M7 4l3 3M17 20V4M17 20l-3-3M17 20l3-3"/></svg>
          <span id="sort-label">Recent</span>
        </button>
        <button id="theme-btn" class="btn btn--icon" title="Switch theme">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
        </button>
        <button id="add-btn" class="btn btn--primary">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          <span>Add books</span>
        </button>
      </div>
    </header>

    <main class="lib">
      <div id="lib-grid" class="grid" aria-live="polite"></div>

      <div id="lib-empty" class="empty hidden">
        <svg class="empty__art" viewBox="0 0 120 120" aria-hidden="true">
          <rect x="24" y="20" width="48" height="66" rx="4"/>
          <rect x="40" y="32" width="48" height="66" rx="4" class="empty__art-2"/>
          <path d="M52 50h24M52 60h24M52 70h14"/>
        </svg>
        <h2>Your library is empty</h2>
        <p>Add EPUB or PDF files and they’ll appear here, ready to read.</p>
        <button id="empty-add-btn" class="btn btn--primary btn--lg">Add your first book</button>
      </div>
    </main>
  </section>

  <!-- ============================ READER ============================ -->
  <section id="reader-view" class="view">
    <div id="reader-surface" class="surface"></div>

    <header id="reader-top" class="rbar rbar--top">
      <button id="reader-back" class="btn btn--icon" title="Back to library (Esc)">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button id="toc-btn" class="btn btn--icon" title="Table of contents">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h12M8 12h12M8 18h12M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>
      </button>
      <div class="rbar__title" id="reader-title">Reading…</div>
      <div class="rbar__tools">
        <div class="seg seg--mode">
          <button id="mode-pages" class="seg-opt" title="Page-turning mode">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="5" width="7" height="14" rx="1.3"/><rect x="13.5" y="5" width="7" height="14" rx="1.3"/></svg>
            <span>Pages</span>
          </button>
          <button id="mode-scroll" class="seg-opt" title="Continuous scroll mode">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7l5 5 5-5M7 13l5 5 5-5"/></svg>
            <span>Scroll</span>
          </button>
        </div>
        <div class="seg">
          <button id="size-down" class="btn btn--icon" title="Smaller">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/></svg>
          </button>
          <span class="seg__sep"></span>
          <button id="size-up" class="btn btn--icon" title="Larger">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
        <button id="reader-theme-btn" class="btn btn--icon" title="Switch theme">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
        </button>
      </div>
    </header>

    <footer id="reader-bottom" class="rbar rbar--bottom">
      <span id="progress-label" class="rbar__label">—</span>
      <input id="progress-slider" class="slider" type="range" min="0" max="1000" value="0" aria-label="Reading progress" />
      <span id="progress-pct" class="rbar__pct">0%</span>
    </footer>

    <div id="toc-panel" class="toc-panel">
      <div class="toc-panel__scrim" id="toc-scrim"></div>
      <aside class="toc-panel__sheet">
        <header class="toc-panel__head">
          <span>Contents</span>
          <button id="toc-close" class="btn btn--icon" title="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </header>
        <div id="toc-list" class="toc-list"></div>
      </aside>
    </div>

    <div id="reader-loading" class="loader hidden">
      <div class="loader__spin"></div>
      <span id="loader-text">Opening…</span>
    </div>
  </section>

  <!-- ============================ SHARED ============================ -->
  <input id="file-input" type="file" accept=".epub,.pdf,application/epub+zip,application/pdf" multiple hidden />

  <div id="drop-overlay" class="drop hidden">
    <div class="drop__inner">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V4M12 4 7 9M12 4l5 5M5 16v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"/></svg>
      <span>Drop EPUB or PDF to add</span>
    </div>
  </div>

  <div id="toast" class="toast" role="status"></div>

  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/epub.min.js"></script>
  <script src="vendor/pdf.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/epub-reader.js"></script>
  <script src="js/pdf-reader.js"></script>
  <script src="js/library.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
